name: Update price history

# Runs every 15 minutes (and manually on demand). GitHub-hosted runners have
# residential-style IPs that don't get rate-limited by Yahoo Finance the way
# Vercel's serverless IPs do, so we can pull real intraday + daily history here.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch history
        run: node scripts/update-history.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "history: $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          else
            echo "no changes"
          fi
