<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark light" />
<meta name="theme-color" content="#0b0f14" />
<title>ME Oil Dashboard</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230b0f14'/><text x='50%25' y='58%25' font-size='36' text-anchor='middle' fill='%23f2b233' font-family='ui-sans-serif,system-ui'>◯</text></svg>" />
<style>
  :root {
    --bg: #0b0f14;
    --panel: #121821;
    --panel-2: #0f141c;
    --border: #1f2937;
    --text: #e6edf3;
    --muted: #8b98a9;
    --up: #22c55e;
    --down: #ef4444;
    --accent: #f2b233;
    --tag-oil-bg: rgba(242, 178, 51, 0.14);
    --tag-oil-fg: #f2b233;
    --tag-oil-border: rgba(242, 178, 51, 0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, ui-sans-serif, system-ui, "Apple Color Emoji", "Segoe UI Emoji";
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px 14px 40px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    letter-spacing: 0.02em;
    color: var(--text);
    font-weight: 600;
  }
  header .sub {
    font-size: 11px;
    color: var(--muted);
  }
  .status {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--up);
    box-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
  }
  .dot.err { background: var(--down); box-shadow: 0 0 6px rgba(239, 68, 68, 0.6); }
  .dot.wait { background: var(--muted); box-shadow: none; }

  .prices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 14px 12px;
  }
  .card .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .card .price {
    font-size: 28px;
    font-weight: 700;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .card .chg {
    font-size: 13px;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .chg.up { color: var(--up); }
  .chg.down { color: var(--down); }
  .chg.flat { color: var(--muted); }

  .chart-card {
    padding: 12px 10px 8px;
  }
  .chart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 4px 8px;
  }
  .chart-head .title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .toggles { display: flex; gap: 6px; }
  .toggles button {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
  }
  .toggles button.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .chart-wrap { position: relative; height: 180px; }

  .news {
    margin-top: 14px;
  }
  .news h2 {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 18px 4px 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .news .filter { display: flex; gap: 6px; }
  .news .filter button {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  .news .filter button.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .item {
    display: block;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--panel);
    margin-bottom: 8px;
    text-decoration: none;
    color: inherit;
  }
  .item.oil {
    background: linear-gradient(180deg, rgba(242,178,51,0.05), transparent 60%), var(--panel);
    border-color: var(--tag-oil-border);
  }
  .item .top {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .item .src {
    font-weight: 600;
    color: var(--text);
    opacity: 0.85;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid var(--tag-oil-border);
    background: var(--tag-oil-bg);
    color: var(--tag-oil-fg);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .item h3 {
    font-size: 14px;
    font-weight: 500;
    margin: 0;
    line-height: 1.35;
    color: var(--text);
  }
  .item:active h3 { opacity: 0.7; }

  .empty {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }

  footer {
    margin-top: 22px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
  }
  footer a { color: var(--muted); }

  @media (max-width: 420px) {
    .card .price { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Middle East × Oil</h1>
      <div class="sub">Brent &amp; WTI · live · ME news</div>
    </div>
    <div class="status" id="status">
      <span class="dot wait" id="statusDot"></span>
      <span id="statusText">loading…</span>
    </div>
  </header>

  <section class="prices" id="prices">
    <div class="card" id="card-bz">
      <div class="label">Brent (BZ=F)</div>
      <div class="price" id="price-bz">—</div>
      <div class="chg flat" id="chg-bz">—</div>
    </div>
    <div class="card" id="card-cl">
      <div class="label">WTI (CL=F)</div>
      <div class="price" id="price-cl">—</div>
      <div class="chg flat" id="chg-cl">—</div>
    </div>
  </section>

  <section class="card chart-card">
    <div class="chart-head">
      <div class="title" id="chartTitle">Brent · 1D</div>
      <div class="toggles">
        <button data-sym="BZ=F" class="active">Brent</button>
        <button data-sym="CL=F">WTI</button>
        <span style="width:8px"></span>
        <button data-range="1d" class="active">1D</button>
        <button data-range="5d">5D</button>
        <button data-range="1mo">1M</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </section>

  <section class="news">
    <h2>
      <span>News feed</span>
      <span class="filter">
        <button data-filter="all" class="active">All</button>
        <button data-filter="oil">Oil-impact</button>
      </span>
    </h2>
    <div id="newsList"></div>
  </section>

  <footer>
    Auto-refresh: prices every 2&nbsp;min · news every 5&nbsp;min. Data: Yahoo Finance, Google News.
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
(() => {
  const API_PRICES = "/api/prices";
  const API_NEWS = "/api/news";

  const PRICE_INTERVAL = 2 * 60 * 1000;
  const NEWS_INTERVAL = 5 * 60 * 1000;

  const state = {
    selectedSymbol: "BZ=F",
    selectedRange: "1d",
    newsFilter: "all",
    prices: { "BZ=F": null, "CL=F": null },
    chartData: null,
    chart: null,
    news: [],
  };

  const el = (id) => document.getElementById(id);
  const fmt = (n, d = 2) => (n == null || !isFinite(n) ? "—" : n.toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d }));
  const fmtPct = (n) => (n == null || !isFinite(n) ? "—" : (n >= 0 ? "+" : "") + n.toFixed(2) + "%");
  const fmtSigned = (n) => (n == null || !isFinite(n) ? "—" : (n >= 0 ? "+" : "") + n.toFixed(2));

  function setStatus(kind, text) {
    const dot = el("statusDot");
    dot.className = "dot" + (kind === "err" ? " err" : kind === "wait" ? " wait" : "");
    el("statusText").textContent = text;
  }

  async function fetchPrices() {
    try {
      const [bz, cl] = await Promise.all([
        fetch(API_PRICES + "?symbol=BZ%3DF&range=1d").then((r) => r.json()),
        fetch(API_PRICES + "?symbol=CL%3DF&range=1d").then((r) => r.json()),
      ]);
      if (bz && !bz.error) state.prices["BZ=F"] = bz;
      if (cl && !cl.error) state.prices["CL=F"] = cl;
      renderPriceCards();
      setStatus("ok", "updated " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }));
      return true;
    } catch (e) {
      console.error("prices failed", e);
      setStatus("err", "prices error");
      return false;
    }
  }

  function renderPriceCards() {
    for (const sym of ["BZ=F", "CL=F"]) {
      const id = sym === "BZ=F" ? "bz" : "cl";
      const p = state.prices[sym];
      if (!p) continue;
      el("price-" + id).textContent = "$" + fmt(p.last);
      const chgEl = el("chg-" + id);
      chgEl.textContent = `${fmtSigned(p.change)}  (${fmtPct(p.changePct)})`;
      chgEl.className = "chg " + (p.change > 0 ? "up" : p.change < 0 ? "down" : "flat");
    }
  }

  async function fetchChart() {
    const sym = state.selectedSymbol;
    const range = state.selectedRange;
    el("chartTitle").textContent =
      (sym === "BZ=F" ? "Brent" : "WTI") + " · " + range.toUpperCase();
    try {
      const url = `${API_PRICES}?symbol=${encodeURIComponent(sym)}&range=${encodeURIComponent(range)}`;
      const data = await fetch(url).then((r) => r.json());
      if (data && !data.error) {
        state.chartData = data;
        renderChart();
      }
    } catch (e) {
      console.error("chart failed", e);
    }
  }

  function renderChart() {
    const data = state.chartData;
    if (!data || !data.series) return;
    const points = data.series.map((p) => ({ x: p.t, y: p.c }));
    const up = data.change >= 0;
    const color = up ? "#22c55e" : "#ef4444";
    const bg = up ? "rgba(34,197,94,0.14)" : "rgba(239,68,68,0.14)";

    const ctx = document.getElementById("chart");
    if (state.chart) state.chart.destroy();
    state.chart = new Chart(ctx, {
      type: "line",
      data: {
        datasets: [
          {
            data: points,
            borderColor: color,
            backgroundColor: bg,
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.25,
            fill: "origin",
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: "nearest", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            displayColors: false,
            backgroundColor: "#111827",
            titleColor: "#8b98a9",
            bodyColor: "#e6edf3",
            borderColor: "#1f2937",
            borderWidth: 1,
            callbacks: {
              title: (items) => {
                const t = items[0].parsed.x;
                return new Date(t).toLocaleString([], {
                  month: "short",
                  day: "numeric",
                  hour: "2-digit",
                  minute: "2-digit",
                });
              },
              label: (item) => "$" + item.parsed.y.toFixed(2),
            },
          },
        },
        scales: {
          x: {
            type: "time",
            grid: { display: false },
            ticks: { color: "#8b98a9", maxRotation: 0, autoSkip: true, maxTicksLimit: 5, font: { size: 10 } },
          },
          y: {
            grid: { color: "rgba(139,152,169,0.08)" },
            ticks: { color: "#8b98a9", font: { size: 10 } },
            position: "right",
          },
        },
      },
    });
  }

  function setupToggles() {
    document.querySelectorAll(".toggles button[data-sym]").forEach((b) => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".toggles button[data-sym]").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        state.selectedSymbol = b.dataset.sym;
        fetchChart();
      });
    });
    document.querySelectorAll(".toggles button[data-range]").forEach((b) => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".toggles button[data-range]").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        state.selectedRange = b.dataset.range;
        fetchChart();
      });
    });
    document.querySelectorAll(".news .filter button").forEach((b) => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".news .filter button").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        state.newsFilter = b.dataset.filter;
        renderNews();
      });
    });
  }

  async function fetchNews() {
    try {
      const data = await fetch(API_NEWS).then((r) => r.json());
      if (data && data.items) {
        state.news = data.items;
        renderNews();
      }
    } catch (e) {
      console.error("news failed", e);
    }
  }

  function timeAgo(iso) {
    const t = Date.parse(iso);
    if (!t) return "";
    const s = (Date.now() - t) / 1000;
    if (s < 60) return "just now";
    if (s < 3600) return Math.floor(s / 60) + "m ago";
    if (s < 86400) return Math.floor(s / 3600) + "h ago";
    return Math.floor(s / 86400) + "d ago";
  }

  function sourceOf(item) {
    if (item.source) return item.source;
    // Google News titles often end with " - Source Name"
    const m = /\s-\s([^-]+)$/.exec(item.title);
    return m ? m[1].trim() : "";
  }

  function cleanTitle(item) {
    const src = sourceOf(item);
    if (src && item.title.endsWith(" - " + src)) {
      return item.title.slice(0, -(" - " + src).length);
    }
    return item.title;
  }

  function renderNews() {
    const list = el("newsList");
    list.innerHTML = "";
    const filtered =
      state.newsFilter === "oil" ? state.news.filter((i) => i.oilImpact) : state.news;
    if (!filtered.length) {
      list.innerHTML = '<div class="empty">No items yet.</div>';
      return;
    }
    for (const item of filtered.slice(0, 40)) {
      const a = document.createElement("a");
      a.href = item.link;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "item" + (item.oilImpact ? " oil" : "");
      const src = sourceOf(item);
      const ago = timeAgo(item.pubDate);
      a.innerHTML = `
        <div class="top">
          <span class="src">${escapeHtml(src)}</span>
          ${ago ? `<span>· ${ago}</span>` : ""}
          ${item.oilImpact ? '<span class="tag">oil</span>' : ""}
        </div>
        <h3>${escapeHtml(cleanTitle(item))}</h3>`;
      list.appendChild(a);
    }
  }

  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
    );
  }

  async function boot() {
    setupToggles();
    setStatus("wait", "loading…");
    await Promise.all([fetchPrices(), fetchChart(), fetchNews()]);
    setInterval(async () => {
      await fetchPrices();
      await fetchChart();
    }, PRICE_INTERVAL);
    setInterval(fetchNews, NEWS_INTERVAL);
    // Refresh when tab becomes visible
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        fetchPrices();
        fetchChart();
        fetchNews();
      }
    });
  }

  boot();
})();
</script>
</body>
</html>
